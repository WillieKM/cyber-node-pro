<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Post | Cyber-Node</title>
<meta name="description" content="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/mobile.css">

<style>
  :root {
    --bg: #0e1f38;
    --bg2: #142840;
    --border: #2e5070;
    --accent: #00d4ff;
    --text: #e8f4ff;
    --muted: #90bcd8;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Rajdhani', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    margin: 0;
    line-height: 1.6;
    overflow-x: hidden;
  }

  .post-wrap {
    max-width: 780px;
    margin: 120px auto 100px;
    padding: 0 20px;
  }

  /* Post header */
  .post-header { margin-bottom: 40px; }

  .post-meta-top {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
  }

  .blog-category {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 3px;
    border: 1px solid;
  }

  .blog-date {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  .post-title {
    font-size: 40px;
    line-height: 1.2;
    letter-spacing: -0.5px;
    margin: 0 0 15px;
  }

  .post-description {
    font-family: var(--mono);
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 20px;
    line-height: 1.7;
  }

  .post-author {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    padding: 12px 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  .post-cover {
    width: 100%;
    border-radius: 8px;
    border: 1px solid var(--border);
    margin: 30px 0;
    display: block;
  }

  /* Post body — markdown rendered content */
  .post-body {
    font-size: 17px;
    line-height: 1.8;
    color: #d0e8f8;
  }

  .post-body h2 {
    font-size: 26px;
    color: var(--text);
    margin: 40px 0 15px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .post-body h3 {
    font-size: 20px;
    color: var(--accent);
    margin: 30px 0 12px;
    font-family: var(--mono);
  }

  .post-body p { margin-bottom: 20px; }

  .post-body a { color: var(--accent); }

  .post-body code {
    font-family: var(--mono);
    background: rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.15);
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 14px;
    color: var(--accent);
  }

  .post-body pre {
    background: #091828;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    overflow-x: auto;
    margin: 25px 0;
  }

  .post-body pre code {
    background: none;
    border: none;
    padding: 0;
    color: #90bcd8;
    font-size: 13px;
  }

  .post-body ul, .post-body ol {
    padding-left: 25px;
    margin-bottom: 20px;
  }

  .post-body li { margin-bottom: 8px; }

  .post-body blockquote {
    border-left: 3px solid var(--accent);
    margin: 25px 0;
    padding: 15px 20px;
    background: rgba(0,212,255,0.04);
    font-family: var(--mono);
    font-size: 14px;
    color: var(--muted);
  }

  .post-body strong { color: var(--text); }

  .post-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 35px 0;
  }

  /* Post footer */
  .post-footer {
    margin-top: 60px;
    padding-top: 30px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
  }

  .cn-btn {
    display: inline-block;
    padding: 12px 24px;
    font-family: var(--mono);
    font-weight: 700;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 4px;
    letter-spacing: 1px;
    font-size: 13px;
    transition: 0.3s;
  }

  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-outline  { border: 1px solid var(--accent); color: var(--accent); }
  .cn-btn:hover { box-shadow: 0 0 20px rgba(0,212,255,0.4); }

  @media (max-width: 600px) {
    .post-wrap { margin-top: 100px; }
    .post-title { font-size: 28px; }
    .post-body { font-size: 15px; }
    .post-footer { flex-direction: column; }
    .post-footer .cn-btn { width: 100%; text-align: center; }
  }
</style>
</head>
<body>

<div id="navbar"></div>

<div class="post-wrap">
  <div id="post-content">
    <!-- Rendered by blog.js -->
  </div>
</div>

<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="../js/blog.js"></script>
<script>
  fetch("../components/navbar.html")
    .then(r => r.ok ? r.text() : '')
    .then(html => { if(html) document.getElementById("navbar").innerHTML = html; })
    .catch(e => console.error("Nav:", e));

  fetch("../components/footer.html")
    .then(r => r.ok ? r.text() : '')
    .then(html => { if(html) document.getElementById("footer").innerHTML = html; })
    .catch(e => console.error("Footer:", e));

  window.addEventListener('DOMContentLoaded', () => {
    window.CyberBlog.renderPost('post-content');
  });
</script>

</body>
</html>
