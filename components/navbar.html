<style>
  /* Base Navbar Styles */
  .navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 75px;
    background: rgba(10, 22, 40, 0.9);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-bottom: 1px solid var(--border);
    z-index: 10000;
    display: flex;
    align-items: center;
  }

  .nav-container {
    width: 100%;
    max-width: 1300px;
    margin: 0 auto;
    padding: 0 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* Logo */
  .logo {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 24px;
    color: #f0f8ff;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .logo::after {
    content: '-NODE';
    color: var(--accent);
  }

  /* Links Wrapper */
  .nav-links {
    display: flex;
    align-items: center;
    gap: 25px;
  }

  .nav-links a, .dropdown span {
    text-decoration: none;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: color 0.3s ease;
    cursor: pointer;
  }

  .nav-links a:hover, .dropdown:hover span {
    color: var(--accent);
  }

  /* Dropdown Logic */
  .dropdown {
    position: relative;
    padding: 10px 0;
  }

  .dropdown-content {
    display: none;
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: #142840;
    border: 1px solid var(--border);
    min-width: 180px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    border-radius: 4px;
    overflow: hidden;
  }

  .dropdown:hover .dropdown-content {
    display: block;
    animation: fadeIn 0.2s ease-out;
  }

  .dropdown-content a {
    display: block;
    padding: 12px 20px;
    font-size: 11px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .dropdown-content a:last-child { border-bottom: none; }

  .dropdown-content a:hover {
    background: rgba(0, 212, 255, 0.1);
    color: var(--accent);
  }

  /* Contact Button (CTA) */
  .nav-cta {
    background: var(--accent) !important;
    color: #0a1628 !important;
    padding: 10px 22px !important;
    border-radius: 4px;
    font-weight: 700 !important;
    margin-left: 10px;
    box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
  }

  .nav-cta:hover {
    box-shadow: 0 0 25px rgba(0, 212, 255, 0.5);
    transform: translateY(-1px);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translate(-50%, 10px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }

  @media (max-width: 1024px) {
    .nav-links a:not(.nav-cta), .dropdown { display: none; }
  }
</style>

<header class="navbar">
  <div class="nav-container">
    
    <div class="logo">Cyber</div>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="pricing.html">Pricing</a>
      <a href="case-studies.html">Case Studies</a>
      <a href="resources.html">Resources</a>

      <div class="dropdown">
        <span>Tools ▾</span>
        <div class="dropdown-content">
          <a href="tools/security-scan.html">Security Scan</a>
          <a href="tools/attack-surface.html">Attack Surface</a>
          <a href="risk-check.html">Risk Check Tool</a>
        </div>
      </div>

      <a href="dashboard.html">Dashboard</a>
      <a href="contact.html" class="nav-cta">Contact</a>
    </div>

  </div>
</header>
