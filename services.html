<script>

let latestScore = 0
let latestLevel = ""
let latestRecommendation = ""

/* MAIN CALCULATION */
function calculateScore(){

const email = document.getElementById("email").value.trim()

if(!email){
alert("Please enter your email to view your security score.")
return
}

if(!email.includes("@")){
alert("Enter a valid email address.")
return
}

/* BUTTON FIX (safer selector) */
const btn = document.querySelector(".security-form button")

if(!btn) return

btn.innerText = "Analyzing..."
btn.disabled = true

setTimeout(()=>{

/* INPUT VALUES */
const industry = parseInt(document.getElementById("industry").value || 0)
const companySize = parseInt(document.getElementById("companySize").value || 0)
const monitoring = parseInt(document.getElementById("monitoring").value || 0)
const compliance = parseInt(document.getElementById("compliance").value || 0)

/* SCORE LOGIC */
const risk = industry + companySize + monitoring + compliance
const score = Math.max(0, 100 - risk)

/* LEVEL LOGIC */
let level = "Low Risk"
let recommendation = "Security Monitoring"
let color = "#22c55e"

if(score < 70){
level = "Moderate Risk"
recommendation = "Security Risk Assessment"
color = "#f59e0b"
}

if(score < 50){
level = "High Risk"
recommendation = "Penetration Testing"
color = "#ef4444"
}

/* SAVE GLOBAL */
latestScore = score
latestLevel = level
latestRecommendation = recommendation

/* RESULT UI */
const resultCard = document.getElementById("resultCard")

if(resultCard){
resultCard.style.display = "block"

resultCard.innerHTML = `
<h3>Security Assessment Results</h3>

<p><strong>Score:</strong> 
<span style="color:${color}; font-size:22px; font-weight:bold;">
${score}/100
</span></p>

<p><strong>Risk Level:</strong> ${level}</p>

<p><strong>Recommended Service:</strong> 
<span style="color:#3b82f6; font-weight:600;">
${recommendation}
</span></p>

<hr style="margin:20px 0; opacity:0.1;">

<p style="font-size:14px; opacity:0.8;">
A detailed security report is available for your organization.
</p>
`
}

/* SHOW DOWNLOAD BUTTON */
const downloadBtn = document.getElementById("downloadBtn")
if(downloadBtn){
downloadBtn.style.display = "inline-block"
}

/* RESET BUTTON */
btn.innerText = "Calculate Security Score"
btn.disabled = false

/* SAVE LEAD */
saveLead(email, score, level, recommendation)

}, 1000)

}


/* SAVE LEAD (LOCAL STORAGE) */
function saveLead(email, score, level, recommendation){

try{

let leads = JSON.parse(localStorage.getItem("cybernode_leads") || "[]")

leads.push({
email,
score,
level,
recommendation,
date: new Date().toISOString()
})

localStorage.setItem("cybernode_leads", JSON.stringify(leads))

}catch(e){
console.log("Storage error:", e)
}

}


/* PDF DOWNLOAD */
function downloadReport(){

if(!latestScore) return

const { jsPDF } = window.jspdf
const doc = new jsPDF()

doc.setFontSize(18)
doc.text("Cyber-Node Security Report",20,30)

doc.setFontSize(12)

doc.text("Security Score: " + latestScore + "/100",20,60)
doc.text("Risk Level: " + latestLevel,20,70)
doc.text("Recommendation: " + latestRecommendation,20,80)

doc.text(
"This report highlights potential risks and provides recommendations to improve your cybersecurity posture.",
20,
100,
{maxWidth:160}
)

doc.save("CyberNode-Report.pdf")

}

</script>
