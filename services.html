<script>

let latestScore = 0
let latestLevel = ""
let latestRecommendation = ""

function calculateScore(){

let email = document.getElementById("email").value

if(email === ""){
alert("Please enter your email to view your security score.")
return
}

/* Optional: basic email validation */
if(!email.includes("@")){
alert("Enter a valid email address.")
return
}

/* LOADING STATE */
const btn = document.querySelector(".security-form button")
btn.innerText = "Analyzing..."
btn.disabled = true

setTimeout(()=>{

let industry = parseInt(document.getElementById("industry").value || 0)
let companySize = parseInt(document.getElementById("companySize").value || 0)
let monitoring = parseInt(document.getElementById("monitoring").value || 0)
let compliance = parseInt(document.getElementById("compliance").value || 0)

let risk = industry + companySize + monitoring + compliance
let score = 100 - risk

let level = "Low Risk"
let recommendation = "Security Monitoring"
let color = "#22c55e"

if(score < 70){
level = "Moderate Risk"
recommendation = "Security Risk Assessment"
color = "#f59e0b"
}

if(score < 50){
level = "High Risk"
recommendation = "Penetration Testing"
color = "#ef4444"
}

latestScore = score
latestLevel = level
latestRecommendation = recommendation

document.getElementById("resultCard").style.display = "block"

document.getElementById("resultCard").innerHTML = `
<h3>Security Assessment Results</h3>

<p><strong>Score:</strong> 
<span style="color:${color}; font-size:22px; font-weight:bold;">
${score}/100
</span></p>

<p><strong>Risk Level:</strong> ${level}</p>

<p><strong>Recommended Service:</strong> 
<span style="color:#3b82f6; font-weight:600;">
${recommendation}
</span></p>

<hr style="margin:20px 0; opacity:0.1;">

<p style="font-size:14px; opacity:0.8;">
A detailed security report is available for your organization.
</p>
`

document.getElementById("downloadBtn").style.display="inline-block"

btn.innerText = "Calculate Security Score"
btn.disabled = false

/* SAVE LEAD (local demo version) */
saveLead(email, score)

}, 1200)

}

/* SAVE LEAD (LOCAL STORAGE FOR NOW) */
function saveLead(email, score){

let leads = JSON.parse(localStorage.getItem("cybernode_leads") || "[]")

leads.push({
email: email,
score: score,
date: new Date().toISOString()
})

localStorage.setItem("cybernode_leads", JSON.stringify(leads))

}

/* PDF DOWNLOAD */
function downloadReport(){

const { jsPDF } = window.jspdf
const doc = new jsPDF()

doc.setFontSize(18)
doc.text("Cyber-Node Security Report",20,30)

doc.setFontSize(12)

doc.text("Security Score: " + latestScore + "/100",20,60)
doc.text("Risk Level: " + latestLevel,20,70)
doc.text("Recommended Service: " + latestRecommendation,20,80)

doc.text("Summary:",20,100)

doc.text(
"This report highlights potential security risks and provides recommendations to strengthen your organization's cybersecurity posture.",
20,
110,
{maxWidth:160}
)

doc.save("CyberNode-Report.pdf")

}

</script>
